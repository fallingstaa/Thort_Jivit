name: thort_jivit
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: '^3.7.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  firebase_storage: ^13.0.2
  firebase_database: ^12.0.2
  shared_preferences: ^2.0.15
  file_picker: ^8.1.2
  camera: ^0.10.5+5
  permission_handler: ^11.0.1
  video_player: ^2.8.1
  ffmpeg_kit_flutter_new: ^4.0.0
  image_picker: ^1.0.4
  cloud_firestore: ^6.1.0
  url_launcher: ^6.2.5
  share_plus: ^10.1.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  provider: ^6.1.2
  font_awesome_flutter: ^10.7.0
  video_thumbnail: ^0.5.3
  path_provider: ^2.1.1
  workmanager: ^0.9.0
  cached_network_image: ^3.3.1
  crypto: ^3.0.3
  connectivity_plus: ^6.0.0
  battery_plus: ^6.0.0
  get: ^4.6.6
  webview_flutter: ^4.4.2
  package_info_plus: ^8.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/music/
    - assets/images/THORT_1.svg

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/Thort-Jivit-App-Logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  image_path: "assets/images/Thort-Jivit-App-Logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/Thort-Jivit-App-Logo.png"